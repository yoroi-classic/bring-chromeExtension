name: Extension Kit

on:
  pull_request:
    paths:
      - '.github/workflows/extension-kit.yml'
      - 'extension-files/bringweb3-sdk/**'
      - 'extension-files/test-extension/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/extension-kit.yml'
      - 'extension-files/bringweb3-sdk/**'
      - 'extension-files/test-extension/**'

permissions:
  contents: read

jobs:
  sdk:
    name: SDK package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension-files/bringweb3-sdk
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --frozen-lockfile --non-interactive

      - name: Lint
        run: corepack yarn lint

      - name: Build
        run: corepack yarn build

      - name: Test
        run: corepack yarn test

      - name: Smoke test
        run: corepack yarn test:smoke
